# keep default prefix (Ctrl + b)

# Terminal true color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Start windows and panes from 1.
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# prefix keys
unbind C-b
set-option -g prefix C-_                # Ctrl+/
set-option -g prefix2 M-z
bind-key C-_ send-prefix
bind-key M-z send-prefix -2

# Splits
bind c new-window -n "#{b:pane_current_path}-cd" -c "#{pane_current_path}"
bind n new-window -n "#{b:pane_current_path}-n" -c "#{pane_current_path}" "nvim"
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane management
bind x kill-pane
set -g mouse on
# Zoom the OTHER pane (hide current pane) instead of zooming current
bind z run-shell "tmux select-pane -t ':.{next}' && tmux resize-pane -Z"

# Vim-style pane navigation
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

# Session management
bind r command-prompt -I "#S" "rename-session '%%'"
bind K confirm-before -p "Kill ALL sessions? (y/n)" "kill-server"
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# key bindings
bind r source-file ~/.tmux.conf         # reload config

# Pane borders
set -g pane-border-style fg=colour236
set -g pane-active-border-style fg=green
set -g pane-border-lines heavy

# Status bar
set -g status-style bg=green,fg=black,bold
set -g window-status-style fg=black,bg=green
set -g window-status-current-style fg=green,bg=black,bold
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "
set -g status-left ""
set -g status-right ""

# Window auto-rename to current folder
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# Ghostty title bar — live current folder, refreshes every second
set -g status-interval 1
set -g set-titles on
set -g set-titles-string "#{b:pane_current_path}"
